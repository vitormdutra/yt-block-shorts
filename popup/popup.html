<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yt-block-shorts Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="../assets/icon48.png" alt="Logo" class="logo">
      <h1>YouTube Zen Control</h1>
    </header>

    <!-- Granular Zen Mode Toggles -->
    <div class="switch-group">
      <div class="switch-label">
        <span class="title">💬 Hide Comments & Chat</span>
        <span class="description">Keep discussion sections hidden</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="hideCommentsToggle" checked>
        <span class="slider round"></span>
      </label>
    </div>

    <div class="switch-group">
      <div class="switch-label">
        <span class="title">📺 Hide Related Videos</span>
        <span class="description">Remove sidebar recommendations</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="hideRecommendationsToggle" checked>
        <span class="slider round"></span>
      </label>
    </div>

    <div class="switch-group">
      <div class="switch-label">
        <span class="title">🛍️ Hide Merch & Ticket Shelves</span>
        <span class="description">Remove shopping shelves under player</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="hideMerchToggle" checked>
        <span class="slider round"></span>
      </label>
    </div>

    <hr>

    <!-- Real-time Protection Stats -->
    <div class="stats-header">PROTECTION ACTIVITY</div>
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-icon">⚡</div>
        <div class="stat-value" id="adsCount">0</div>
        <div class="stat-label">Ads Blocked</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏩</div>
        <div class="stat-value" id="shortsCount">0</div>
        <div class="stat-label">Shorts Skipped</div>
      </div>
    </div>

    <footer>
      <p>Surgical Precision by vitormdutra</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
