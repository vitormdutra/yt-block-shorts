<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yt-block-shorts Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="../assets/icon48.png" alt="Logo" class="logo">
      <h1>Zen Control</h1>
    </header>

    <div class="switch-group">
      <div class="switch-label">
        <span class="title">🧘 Zen Mode</span>
        <span class="description">Hide comments and related videos</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="zenModeToggle" checked>
        <span class="slider round"></span>
      </label>
    </div>

    <hr>

    <div class="stats">
      <div class="stat-item">
        <span class="label">Status</span>
        <span class="value active">Protected</span>
      </div>
    </div>

    <footer>
      <p>Surgical Precision by vitormdutra</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
